services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diagramclo}
      POSTGRES_USER: ${POSTGRES_USER:-diagramclo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_strong_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diagramclo_user} -d ${POSTGRES_DB:-diagramclo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://diagramclo_user:change_this_strong_password@postgres:5432/diagramclo}
      PORT: ${BACKEND_PORT:-4000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4000}:4000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:80"

volumes:
  postgres_data:
  backend_uploads:
